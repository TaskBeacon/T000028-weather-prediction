subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3
subinfo_mapping:
  subject_id: 受试者编号（3位）
  Participant Information: 被试信息
  registration_failed: 注册失败
  registration_successful: 注册成功
  invalid_input: "{field} 输入无效"
window:
  size: [1280, 720]
  units: pix
  screen: 0
  bg_color: black
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60
task:
  task_name: weather_prediction
  save_path: ./outputs/sim_sampler
  total_blocks: 1
  total_trials: 20
  trial_per_block: 20
  conditions:
    - probabilistic_classification
  key_list:
    - f
    - j
    - space
  sun_key: f
  rain_key: j
  seed_mode: same_across_sub
  delta: 1
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
  weather_labels:
    sun: 晴天
    rain: 雨天
  card_labels:
    - 线索卡1
    - 线索卡2
    - 线索卡3
    - 线索卡4
  card_state_labels:
    "on": 出现
    "off": 未出现
timing:
  fixation_duration: [0.3, 0.6]
  cue_duration: 0.8
  decision_deadline: 2.5
  feedback_duration: 1.0
  iti_duration: [0.3, 0.6]
stimuli:
  instruction_text:
    type: text
    text: |
      天气预测任务

      每轮会看到 4 张线索卡片，其中部分卡片会出现。
      请根据当前卡片组合预测天气：
      F = 晴天，J = 雨天。

      线索与天气之间是概率关系，无法每次都完全确定。
      你的目标是通过反馈逐步学会更好的预测策略。

      按空格键开始。
    color: white
    height: 30
    wrapWidth: 1080
    pos: [0, 60]
    font: SimHei
  fixation:
    type: text
    text: "+"
    color: [0.92, 0.92, 0.92]
    height: 52
    pos: [0, 0]
    font: SimHei
  cue_title:
    type: text
    text: "请观察本轮线索卡片"
    color: [0.95, 0.95, 0.92]
    height: 34
    wrapWidth: 1040
    pos: [0, 305]
    font: SimHei
  score_text:
    type: text
    text: "当前得分：{current_score}"
    color: [0.80, 0.95, 0.86]
    height: 30
    pos: [0, 255]
    font: SimHei
  cue_hint:
    type: text
    text: "卡片出现状态已在下方标出，请准备做出天气预测。"
    color: [0.86, 0.86, 0.86]
    height: 24
    wrapWidth: 1100
    pos: [0, -210]
    font: SimHei
  cue_card_template:
    type: text
    text: "卡片\n状态"
    color: [0.95, 0.95, 0.95]
    height: 34
    wrapWidth: 240
    pos: [0, 70]
    font: SimHei
  decision_prompt:
    type: text
    text: "根据当前卡片组合，预测天气类型"
    color: [0.98, 0.92, 0.62]
    height: 30
    wrapWidth: 1000
    pos: [0, -255]
    font: SimHei
  key_hint:
    type: text
    text: "按键：{sun_key}={sun_label}，{rain_key}={rain_label}"
    color: [0.92, 0.92, 0.92]
    height: 26
    wrapWidth: 980
    pos: [0, -295]
    font: SimHei
  feedback_correct:
    type: text
    text: |
      预测正确
      你的选择：{predicted_weather_cn}
      实际天气：{actual_weather_cn}
      本轮得分变化：{score_delta:+d}
      当前得分：{score_after}
    color: [0.70, 0.96, 0.70]
    height: 30
    wrapWidth: 980
    pos: [0, 30]
    font: SimHei
  feedback_incorrect:
    type: text
    text: |
      预测错误
      你的选择：{predicted_weather_cn}
      实际天气：{actual_weather_cn}
      本轮得分变化：{score_delta:+d}
      当前得分：{score_after}
    color: [1.0, 0.78, 0.62]
    height: 30
    wrapWidth: 980
    pos: [0, 30]
    font: SimHei
  feedback_timeout:
    type: text
    text: |
      本轮未在时限内作答
      实际天气：{actual_weather_cn}
      当前得分：{score_after}
    color: [1.0, 0.50, 0.50]
    height: 32
    wrapWidth: 980
    pos: [0, 20]
    font: SimHei
  block_break:
    type: text
    text: |
      第 {block_num}/{total_blocks} 组完成

      作答准确率：{accuracy:.1%}
      超时次数：{timeout_count}
      平均反应时：{mean_rt_ms:.0f} ms
      晴天选择比例：{sun_prediction_rate:.1%}
      本组净得分：{net_score:+d}
      当前总得分：{score_end}

      按空格键继续。
    color: white
    height: 26
    wrapWidth: 1080
    pos: [0, 0]
    font: SimHei
  good_bye:
    type: text
    text: |
      任务结束

      总试次数：{total_trials}
      有效作答次数：{response_count}
      总体准确率：{accuracy:.1%}
      超时次数：{timeout_count}
      平均反应时：{mean_rt_ms:.0f} ms
      晴天选择比例：{sun_prediction_rate:.1%}
      总净得分：{net_score:+d}
      最终得分：{score_end}

      按空格键退出。
    color: white
    height: 26
    wrapWidth: 1080
    pos: [0, 0]
    font: SimHei
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    fixation_onset: 20
    cue_onset: 30
    decision_onset: 40
    choice_sun: 41
    choice_rain: 42
    choice_timeout: 43
    feedback_correct: 50
    feedback_incorrect: 51
    feedback_timeout: 52
    iti_onset: 60
  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
  timing:
    post_delay_ms: 1
  policy:
    strict: false
